<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Analyse your Chess games, free of charge.">
    <meta name="theme-color" content="#e74c3c">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>LocalGM</title>
    <link rel="stylesheet" href="/lib/chessboard/assets/chessboard.css">
    <link rel="stylesheet" href="/lib/chessboard/assets/extensions/arrows/arrows.css">
    <link rel="stylesheet" href="/lib/chessboard/assets/extensions/markers/markers.css">
    <style>
        #header {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 56px;
            padding: 0 24px;
            background: #1a1a1a;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        #header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1240px;
        }
        #header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #logo {
            font-size: 17px;
            font-weight: 700;
            color: #e74c3c;
            letter-spacing: -0.3px;
        }
        #tagline {
            font-size: 12px;
            color: #807e78;
            padding-left: 12px;
            border-left: 1px solid rgba(255,255,255,0.08);
        }
        .root {
            min-height: calc(100vh - 56px);
        }
    </style>
</head>
<body>
    <div id="header">
        <div id="header-inner">
            <div id="header-left">
                <span id="logo">LocalGM</span>
                <span id="tagline">game analysis</span>
            </div>
        </div>
    </div>
    <div class="root"></div>
    <script src="/analysis.bundle.js"></script>
</body>
</html>
